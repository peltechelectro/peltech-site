name: Deploy to Hostico

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP (curl)
        run: |
          cd site
          find . -type f | while read f; do
            remote="${f#./}"
            echo "Uploading: $remote"
            curl -s -S --ftp-create-dirs \
              -T "$f" \
              "ftp://${{ secrets.FTP_HOST }}/$remote" \
              -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
              || echo "EROARE la: $remote"
          done
